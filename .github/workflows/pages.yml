name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare docs source
        run: |
          mkdir -p _site_src/docs
          cp README.md _site_src/index.md
          cp LICENSE _site_src/LICENSE.md
          cp -r docs/* _site_src/docs/
          cat > _site_src/_config.yml << 'EOF'
          title: ptouch
          description: Brother P-Touch network label printer CLI
          theme: jekyll-theme-minimal
          markdown: GFM
          permalink: pretty
          EOF

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: _site_src
          destination: _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
