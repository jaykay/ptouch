name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare docs source
        run: |
          mkdir -p _site_src/docs

          # README as index — rewrite .md links to .html for Pages
          printf -- '---\ntitle: Home\nnav_order: 1\n---\n' > _site_src/index.md
          sed 's/\(docs\/[a-z]*\)\.md/\1.html/g' README.md >> _site_src/index.md

          # Docs already have front matter
          cp -r docs/* _site_src/docs/

          # Config
          cat > _site_src/_config.yml << 'YAML'
          title: ptouch
          description: Brother P-Touch network label printer CLI
          remote_theme: just-the-docs/just-the-docs@v0.10.1
          markdown: GFM
          color_scheme: light
          aux_links:
            License: https://github.com/jaykay/ptouch/blob/main/LICENSE
            GitHub: https://github.com/jaykay/ptouch
            Releases: https://github.com/jaykay/ptouch/releases
          YAML

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: _site_src
          destination: _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
